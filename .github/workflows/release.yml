name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to release (for example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: mot
  TAP_REPO: daulet/homebrew-tap
  TAP_BRANCH: main
  FORMULA_PATH: Formula/mot.rb
  FORMULA_DESC: "Fast CLI to aggregate LLM token usage from Codex and Claude Code metadata"

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve_tag:
    name: Resolve Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Resolve release tag
        id: resolve
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ "${TAG}" != v* ]]; then
            echo "Tag must start with v (received: ${TAG})" >&2
            exit 1
          fi

          VERSION="${TAG#v}"
          if [[ -z "${VERSION}" ]]; then
            echo "Could not infer version from tag ${TAG}" >&2
            exit 1
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  verify:
    name: Verify Release Candidate
    needs: resolve_tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve_tag.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Tests
        run: cargo test --all-targets --locked

  build:
    name: Build ${{ matrix.target }}
    needs:
      - resolve_tag
      - verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            deb_arch: amd64
            linker_package: ""
            linker_env: ""
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            deb_arch: arm64
            linker_package: gcc-aarch64-linux-gnu
            linker_env: CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          - os: macos-14
            target: aarch64-apple-darwin
            deb_arch: ""
            linker_package: ""
            linker_env: ""
          - os: macos-14
            target: x86_64-apple-darwin
            deb_arch: ""
            linker_package: ""
            linker_env: ""
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve_tag.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: rustup target add "${TARGET}"

      - name: Install cross linker
        if: ${{ matrix.linker_package != '' }}
        shell: bash
        env:
          LINKER_PACKAGE: ${{ matrix.linker_package }}
        run: |
          sudo apt-get update
          sudo apt-get install -y "${LINKER_PACKAGE}"

      - name: Build release binary
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          LINKER_ENV: ${{ matrix.linker_env }}
        run: |
          if [[ -n "${LINKER_ENV}" ]]; then
            export "${LINKER_ENV}"
          fi
          cargo build --release --locked --target "${TARGET}"

      - name: Package archive and checksum
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ needs.resolve_tag.outputs.version }}
          DEB_ARCH: ${{ matrix.deb_arch }}
        run: |
          mkdir -p dist
          cp "target/${TARGET}/release/${BINARY_NAME}" "dist/${BINARY_NAME}"
          tar -C dist -czf "dist/${BINARY_NAME}-${TARGET}.tar.gz" "${BINARY_NAME}"

          if [[ -n "${DEB_ARCH}" ]]; then
            .github/scripts/package_deb.sh \
              --binary "dist/${BINARY_NAME}" \
              --name "${BINARY_NAME}" \
              --version "${VERSION}" \
              --arch "${DEB_ARCH}" \
              --out-dir dist \
              --desc "${FORMULA_DESC}"
          fi

          rm -f "dist/${BINARY_NAME}"

          python3 - <<'PY'
          import hashlib
          import os
          from pathlib import Path

          target = os.environ["TARGET"]
          artifacts = sorted(
              path
              for path in Path("dist").iterdir()
              if path.is_file() and not path.name.startswith("checksums-")
          )
          checksum_path = Path("dist") / f"checksums-{target}.txt"
          checksum_path.write_text(
              "".join(
                  f"{hashlib.sha256(path.read_bytes()).hexdigest()}  {path.name}\n"
                  for path in artifacts
              ),
              encoding="utf-8",
          )
          PY

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs:
      - resolve_tag
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve_tag.outputs.tag }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Add install script
        shell: bash
        run: |
          install -m 755 install.sh dist/install.sh

      - name: Combine checksums
        shell: bash
        run: |
          cat dist/checksums-*.txt | sort > dist/checksums.txt
          python3 - <<'PY'
          import hashlib
          from pathlib import Path

          script = Path("dist/install.sh")
          with Path("dist/checksums.txt").open("a", encoding="utf-8") as checksums:
              checksums.write(f"{hashlib.sha256(script.read_bytes()).hexdigest()}  {script.name}\n")
          PY
          ls -lh dist

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve_tag.outputs.tag }}
          name: ${{ needs.resolve_tag.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.deb
            dist/install.sh
            dist/checksums.txt

  update_homebrew:
    name: Update Homebrew Tap
    needs:
      - resolve_tag
      - publish
    runs-on: ubuntu-latest
    steps:
      - name: Require tap token
        shell: bash
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [[ -z "${HOMEBREW_TAP_TOKEN}" ]]; then
            echo "::error::HOMEBREW_TAP_TOKEN is required for release publishing."
            exit 1
          fi

      - name: Checkout release repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Resolve macOS checksums
        id: sha
        shell: bash
        run: |
          cat dist/checksums-*.txt | sort > dist/checksums.txt

          INTEL_SHA="$(awk '$2 ~ /mot-x86_64-apple-darwin\.tar\.gz$/ {print $1}' dist/checksums.txt | tail -n1)"
          ARM_SHA="$(awk '$2 ~ /mot-aarch64-apple-darwin\.tar\.gz$/ {print $1}' dist/checksums.txt | tail -n1)"

          if [[ -z "${INTEL_SHA}" || -z "${ARM_SHA}" ]]; then
            echo "Failed to locate required macOS checksums in dist/checksums.txt" >&2
            exit 1
          fi

          echo "intel_sha=${INTEL_SHA}" >> "$GITHUB_OUTPUT"
          echo "arm_sha=${ARM_SHA}" >> "$GITHUB_OUTPUT"

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TAP_REPO }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Render formula
        shell: bash
        run: |
          python3 .github/scripts/update_homebrew_formula.py \
            --formula "homebrew-tap/${FORMULA_PATH}" \
            --repo "${GITHUB_REPOSITORY}" \
            --tag "${{ needs.resolve_tag.outputs.tag }}" \
            --version "${{ needs.resolve_tag.outputs.version }}" \
            --binary "${BINARY_NAME}" \
            --sha-intel "${{ steps.sha.outputs.intel_sha }}" \
            --sha-arm "${{ steps.sha.outputs.arm_sha }}" \
            --desc "${FORMULA_DESC}"

      - name: Commit and push tap update
        shell: bash
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ -z "$(git status --porcelain -- "${FORMULA_PATH}")" ]]; then
            echo "Formula already up to date."
            exit 0
          fi

          git add "${FORMULA_PATH}"
          git commit -m "mot ${{ needs.resolve_tag.outputs.version }}"
          git push origin HEAD:"${TAP_BRANCH}"
